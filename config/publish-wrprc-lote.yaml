# Pipeline: WRPRC Providers LoTE (ETSI TS 119 602)
# Fetches unsigned LoTE from wp4-onboarding, signs with JAdES-B-B,
# and publishes to /var/www/html/lote/wrprc_providers/.

- load-lote:
    - http://wp4-onboarding:8000/lists/wrprc_providers-EU.json

- publish-lote:
    - /var/www/html/lote/wrprc_providers
    - /etc/lote/signing-cert.pem
    - /etc/lote/signing-key.pem
    - xml
